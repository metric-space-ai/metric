name: Release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  artifacts:
    name: Source and Python artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          release_name="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist/source
          git archive \
            --format=tar.gz \
            --prefix="metric-${release_name}/" \
            -o "dist/source/metric-${release_name}.tar.gz" \
            HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python source distribution
        shell: bash
        run: |
          python -m pip install --upgrade build
          python -m build ./python --sdist --outdir dist/python

      - name: Build Python wheel from source distribution
        shell: bash
        env:
          CMAKE_COMMON_VARIABLES: -DMETRIC_PYTHON_USE_BLAS=OFF
        run: python -m pip wheel dist/python/*.tar.gz --no-deps -w dist/python

      - name: Verify Python artifact
        shell: bash
        run: |
          python -m pip install dist/python/*.whl
          for example in python/examples/metric_space/*.py python/examples/engine/*.py; do
            python "$example"
          done
          PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s python/tests/core -v

      - name: Verify C++ core
        shell: bash
        run: |
          cmake --preset core
          cmake --build --preset core --parallel 2
          ctest --preset core

      - name: Verify installed C++ package
        shell: bash
        run: |
          cmake --install build/core --prefix build/install-core --config Debug
          cmake -S tests/downstream_consumer -B build/downstream-consumer \
            -DCMAKE_PREFIX_PATH="$PWD/build/install-core"
          cmake --build build/downstream-consumer --parallel 2 --config Debug
          ctest --test-dir build/downstream-consumer --output-on-failure --build-config Debug

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: metric-source-archive
          path: dist/source/*.tar.gz
          if-no-files-found: error

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metric-python-artifacts
          path: |
            dist/python/*.tar.gz
            dist/python/*.whl
          if-no-files-found: error
