name: Python core wheel

on:
  push:
    branches:
      - master
    tags:
      - "v*"
    paths:
      - ".github/workflows/python-core.yml"
      - "python/**"
      - "metric/**"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/python-core.yml"
      - "python/**"
      - "metric/**"

jobs:
  wheel:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        shell: bash
        env:
          CMAKE_COMMON_VARIABLES: -DMETRIC_PYTHON_USE_BLAS=OFF
        run: python -m pip wheel ./python --no-deps -w wheelhouse

      - name: Install wheel
        shell: bash
        run: python -m pip install wheelhouse/*.whl

      - name: Run metric-space smoke examples
        shell: bash
        run: |
          for example in python/examples/metric_space/*.py; do
            python "$example"
          done

      - name: Run core Python API tests
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s python/tests/core -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: metric-space-${{ matrix.os }}-py${{ matrix.python-version }}
          path: wheelhouse/*.whl
          if-no-files-found: error
