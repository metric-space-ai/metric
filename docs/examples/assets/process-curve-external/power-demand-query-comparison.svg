  <text x="346.0" y="378.0" font-family="Arial, sans-serif" font-size="12" fill="#172033">anomaly role</text>
  <text x="346.0" y="398.0" font-family="Arial, sans-serif" font-size="11" fill="#526070">metric value 324</text>
  <text x="346.0" y="416.0" font-family="Arial, sans-serif" font-size="11" fill="#166534">matches expected role</text>
  <rect x="602.0" y="328.0" width="264.0" height="96" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="620.0" y1="350.0" x2="646.0" y2="350.0" stroke="#dc2626" stroke-width="3"/>
  <text x="654.0" y="354.0" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#991b1b">Baseline winner</text>
  <text x="620.0" y="378.0" font-family="Arial, sans-serif" font-size="12" fill="#172033">pre_anomaly role</text>
  <text x="620.0" y="398.0" font-family="Arial, sans-serif" font-size="11" fill="#526070">baseline value 593</text>
  <text x="620.0" y="416.0" font-family="Arial, sans-serif" font-size="11" fill="#991b1b">wrong role</text>
  <rect x="54" y="432" width="812" height="44" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="72.0" y="452.0" font-family="Arial, sans-serif" font-size="12" fill="#334155">The alignment metric recovers the anomaly role despite the timing shift.</text>
  <text x="72.0" y="470.0" font-family="Arial, sans-serif" font-size="12" fill="#334155">The padded-vector baseline compares index by index and locks onto the pre_anomaly level instead.</text>
</svg>
