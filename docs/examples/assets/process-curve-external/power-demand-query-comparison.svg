  <rect x="54.0" y="328.0" width="264.0" height="96" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="72.0" y1="350.0" x2="98.0" y2="350.0" stroke="#0f172a" stroke-width="3"/>
  <text x="106.0" y="354.0" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#172033">Query (dashed)</text>
  <text x="72.0" y="378.0" font-family="Arial, sans-serif" font-size="12" fill="#172033">anomaly role, 18 samples</text>
  <text x="72.0" y="398.0" font-family="Arial, sans-serif" font-size="11" fill="#526070">the record to recover</text>
  <rect x="328.0" y="328.0" width="264.0" height="96" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="346.0" y1="350.0" x2="372.0" y2="350.0" stroke="#16a34a" stroke-width="3"/>
