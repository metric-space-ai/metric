<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" role="img" aria-labelledby="title desc">
  <title id="title">Power Demand query recovery</title>
  <desc id="desc">A downsampled Power Demand query, the finite metric-space winner record, and the padded-vector baseline winner record, with their metric values and recovered roles.</desc>
