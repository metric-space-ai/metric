<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>METRIC Visual — Performance Harness</title>
  <style>html,body{margin:0;width:100%;height:100%;background:#0e1216}canvas{width:100vw;height:100vh;display:block}</style>
</head>
<body>
  <canvas id="c"></canvas>
  <script type="module">
    // Synthetic point-cloud benchmark. ?n=<count> builds N instanced points,
    // runs the runtime render loop, and reports median frame time over a window
    // of frames as window.metricPerf = { n, frames, medianMs, fps }.
    import { MetricVisualRuntime } from "../src/index.js";

    const params = new URLSearchParams(location.search);
    const n = Math.max(1, Math.min(2_000_000, Number(params.get("n")) || 10000));
    const edges = params.get("edges") === "1";
    const canvas = document.getElementById("c");

    function mulberry32(seed) { let a = seed >>> 0; return () => { a |= 0; a = (a + 0x6d2b79f5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }

    function buildPointDescriptor(count) {
      const rng = mulberry32(0x1234 + count);
      const position = new Float32Array(count * 3);
      const color = new Float32Array(count * 4);
      const size = new Float32Array(count);
      for (let i = 0; i < count; i += 1) {
        const r = 1.6 * Math.cbrt(rng());
        const theta = rng() * Math.PI * 2;
        const phi = Math.acos(2 * rng() - 1);
        position[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        position[i * 3 + 1] = Math.abs(r * Math.cos(phi)) * 0.8;
        position[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
        color.set([0.2 + rng() * 0.6, 0.4 + rng() * 0.4, 0.55 + rng() * 0.4, 1], i * 4);
        size[i] = 0.8 + rng() * 0.6;
      }
      return {
        id: "perf-points",
        primitive: "InstancedPointLayer",
        channels: { position: { array: position, itemSize: 3 }, color: { array: color, itemSize: 4 }, size: { array: size, itemSize: 1 } },
        geometry: { shape: "sphere", instanceCount: count },
        material: { alphaMode: "opaque" },
      };
    }

    const runtime = new MetricVisualRuntime({ canvas, background: [0.06, 0.08, 0.1, 1], postprocess: { tiltShift: false, fxaa: false }, controls: { enabled: false } });
    const descriptors = [buildPointDescriptor(n)];
    runtime.setLayerDescriptors(descriptors);
    runtime.resize(Math.max(1, canvas.clientWidth), Math.max(1, canvas.clientHeight));
    runtime.start();

    // Measure frame intervals over fixed wall-clock windows so slow (large-N)
    // scenes still finish quickly instead of waiting for a fixed frame count.
    const WARMUP_MS = 700;
    const COLLECT_MS = 3500;
    const deltas = [];
    let last = null;
    let warmupUntil = null;
    let collectUntil = null;
    function tick(now) {
      if (warmupUntil == null) { warmupUntil = now + WARMUP_MS; collectUntil = warmupUntil + COLLECT_MS; last = now; requestAnimationFrame(tick); return; }
      if (now >= warmupUntil) { if (last != null) deltas.push(now - last); }
      last = now;
      if (now < collectUntil && deltas.length < 4000) {
        requestAnimationFrame(tick);
      } else {
        const sample = deltas.slice().sort((a, b) => a - b);
        const median = sample.length ? sample[Math.floor(sample.length / 2)] : 0;
        window.metricPerf = {
          n,
          edges,
          frames: sample.length,
          medianMs: Number(median.toFixed(3)),
          fps: median > 0 ? Number((1000 / median).toFixed(1)) : 0,
          layerInstanceCount: runtime.getState().layerInstanceCount,
        };
        document.documentElement.dataset.metricPerfReady = "true";
      }
    }
    requestAnimationFrame(tick);
    window.metricPerfRuntime = runtime;
  </script>
</body>
</html>
