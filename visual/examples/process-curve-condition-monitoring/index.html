<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>METRIC Visual: Process Curves</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%2314221d'/%3E%3Ccircle cx='11' cy='19' r='3' fill='%231f8f67'/%3E%3Ccircle cx='21' cy='12' r='3' fill='%233256ff'/%3E%3Cpath d='M11 19 21 12' stroke='%23e8eee9' stroke-width='2'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #e8eee9;
        color: #14221d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #dfe8e3;
      }

      main {
        position: fixed;
        inset: 0;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        cursor: crosshair;
      }

      .caption {
        position: absolute;
        left: clamp(18px, 2.6vw, 32px);
        top: clamp(18px, 2.8vw, 32px);
        max-width: min(470px, calc(100vw - 36px));
        pointer-events: none;
        text-shadow: 0 1px 18px rgba(248, 250, 246, 0.78);
      }

      h1 {
        margin: 0 0 7px;
        font-size: clamp(18px, 2vw, 24px);
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        max-width: 58ch;
        margin: 0;
        color: rgba(50, 70, 61, 0.86);
        font-size: 13px;
        line-height: 1.45;
      }

      .controls {
        position: absolute;
        right: clamp(16px, 2.4vw, 30px);
        top: clamp(16px, 2.6vw, 30px);
        display: flex;
        align-items: end;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: end;
        max-width: min(430px, calc(100vw - 32px));
      }

      .control {
        display: grid;
        gap: 6px;
        color: rgba(43, 62, 54, 0.82);
        font-size: 12px;
        font-weight: 650;
      }

      input[type="range"] {
        width: min(180px, 44vw);
        accent-color: #1f8f67;
      }

      button {
        min-height: 36px;
        border: 1px solid rgba(96, 120, 108, 0.44);
        background: rgba(248, 250, 246, 0.74);
        color: #14221d;
        padding: 0 12px;
        font: inherit;
        cursor: pointer;
      }

      .matrix-label,
      .loading {
        position: absolute;
        color: rgba(43, 62, 54, 0.78);
        font-size: 12px;
        font-weight: 700;
        pointer-events: none;
        text-shadow: 0 1px 14px rgba(248, 250, 246, 0.74);
      }

      .matrix-label {
        right: clamp(16px, 2.4vw, 30px);
        bottom: clamp(18px, 2.6vw, 32px);
      }

      .loading {
        inset: 0;
        display: grid;
        place-items: center;
        color: #2b3b40;
        font-size: 14px;
      }

      .error {
        color: #7a2222;
      }

      @media (max-width: 760px) {
        .controls {
          left: 18px;
          right: 18px;
          top: auto;
          bottom: 18px;
          justify-content: start;
        }

        .matrix-label {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="scene" aria-label="METRIC process-curve visual"></canvas>
      <section class="caption" aria-hidden="true">
        <h1>METRIC process curves</h1>
        <p>
          Native visual evidence rendered through the public command surface:
          metric space, record tracks, ground field, relation matrix, and
          runtime preview.
        </p>
      </section>
      <div class="controls" aria-label="Process curve controls">
        <label class="control">
          2D/3D morph
          <input id="morph" type="range" min="0" max="1" step="0.001" value="1" />
        </label>
        <button id="morph-toggle" type="button">Animate morph</button>
      </div>
      <div class="matrix-label" id="matrix-label">aligned metric matrix</div>
      <div class="loading" id="loading">Loading process-curve visual...</div>
    </main>

    <script type="module">
      import { createMetricVisual } from "../../src/index.js";

      const VISUAL_EVIDENCE_URL = "../../../docs/examples/assets/process-curve-external/metric.visual.json";
      const PROCESS_CURVE_OPTIONS = {
        coordinateId: "process-curve-external-landmark-3d",
        relationId: "process-curve-external-aligned-metric",
        graphId: "process-curve-external-knn",
        labelPropertyId: "process-role",
        includeMatrix: true,
        includeNeighborhood: true,
        matrixRect: [0.61, 0.25, 0.35, 0.5],
        symmetric: true,
        preview: "pair",
        topK: 4,
        pointSize: 1.55,
        trackMode: "tube",
        trackAlpha: 0.9,
        trackRadius: 0.012,
        trackRadialSegments: 8,
      };

      const elements = {
        canvas: document.getElementById("scene"),
        loading: document.getElementById("loading"),
        matrixLabel: document.getElementById("matrix-label"),
        morph: document.getElementById("morph"),
        morphToggle: document.getElementById("morph-toggle"),
      };

      let visual = null;
      let morphLoop = false;

      try {
        const response = await fetch(VISUAL_EVIDENCE_URL);
        if (!response.ok) throw new Error(`visual evidence ${response.status}`);
        const visualDocument = await response.json();
        if (visualDocument?.schema !== "metric.visual.v1") {
          throw new Error(`Unsupported visual schema: ${visualDocument?.schema || "unknown"}`);
        }

        visual = await createMetricVisual({
          canvas: elements.canvas,
          evidence: visualDocument,
          profileId: "process-curve-condition-monitoring-profile",
        });
        renderProcessCurves();

        elements.morph.addEventListener("input", () => {
          morphLoop = false;
          updateMorphToggle();
          renderProcessCurves();
        });
        elements.morphToggle.addEventListener("click", () => {
          morphLoop = !morphLoop;
          updateMorphToggle();
          renderProcessCurves();
        });

        const matrixDescriptor = visual.descriptors.find((descriptor) => descriptor.primitive === "RelationMatrixLayer");
        const matrixData = matrixDescriptor?.metadata?.matrix;
        elements.matrixLabel.textContent = matrixData
          ? `aligned metric matrix ${matrixData.size}x${matrixData.size}`
          : "aligned metric matrix";

        document.documentElement.dataset.metricProcessCurveConditionMonitoring = "ready";
        document.documentElement.dataset.metricRecordCount = String(visualDocument.records?.length || 0);
        document.documentElement.dataset.metricRelationId = PROCESS_CURVE_OPTIONS.relationId;
        document.documentElement.dataset.metricCommand = "showProcessCurves";
        window.metricProcessCurveConditionMonitoring = {
          visual,
          visualDocument,
          getState: () => visual.getState(),
        };
        elements.loading.remove();
      } catch (error) {
        console.error(error);
        elements.loading.classList.add("error");
        elements.loading.textContent = error instanceof Error ? error.message : String(error);
      }

      function renderProcessCurves() {
        if (!visual) return;
        visual.showProcessCurves({
          ...PROCESS_CURVE_OPTIONS,
          morphLoop,
          morphProgress: Number(elements.morph.value),
        });
      }

      function updateMorphToggle() {
        elements.morphToggle.textContent = morphLoop ? "Pause morph" : "Animate morph";
      }
    </script>
  </body>
</html>
