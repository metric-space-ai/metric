<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>METRIC Visual: Process Curves</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%2314221d'/%3E%3Ccircle cx='11' cy='19' r='3' fill='%231f8f67'/%3E%3Ccircle cx='21' cy='12' r='3' fill='%233256ff'/%3E%3Cpath d='M11 19 21 12' stroke='%23e8eee9' stroke-width='2'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #e8eee9;
        color: #14221d;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1480px, calc(100% - 32px));
        margin: 0 auto;
        padding: 22px 0 34px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        max-width: 850px;
        margin: 8px 0 0;
        color: #51645d;
        line-height: 1.45;
      }

      select,
      button {
        min-height: 38px;
        border: 1px solid #a8b8af;
        background: #f8faf6;
        color: #14221d;
        padding: 0 12px;
      }

      button {
        cursor: pointer;
      }

      input[type="range"] {
        accent-color: #1f8f67;
        width: 150px;
      }

      .controls {
        display: flex;
        align-items: end;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: end;
      }

      .control {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: #51645d;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(420px, 1.2fr) minmax(360px, 0.8fr);
        gap: 14px;
      }

      .panel {
        border: 1px solid #b7c5bd;
        background: #f8faf6;
      }

      canvas {
        display: block;
        width: 100%;
      }

      #scene {
        min-height: 520px;
      }

      #gallery,
      #query {
        min-height: 250px;
      }

      #metric-heatmap,
      #baseline-heatmap {
        min-height: 390px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .wide {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      @media (max-width: 980px) {
        .grid,
        .wide {
          grid-template-columns: 1fr;
        }

        header {
          align-items: start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>METRIC process-curve visualization</h1>
          <p>
            Native METRIC Canvas/WebGL rendering over C++ evidence:
            isometric miniature space, semantic ground projection, 2D/3D
            morph, record curves, query recovery, and pair-value fields.
          </p>
        </div>
        <div class="controls">
          <label class="control">
            Domain
            <select id="domain"></select>
          </label>
          <label class="control">
            2D/3D morph
            <input id="morph" type="range" min="0" max="1" step="0.001" value="1" />
          </label>
          <button id="morph-toggle" type="button">Pause morph</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <canvas id="scene"></canvas>
        </div>
        <div class="stack">
          <div class="panel">
            <canvas id="query"></canvas>
          </div>
          <div class="panel">
            <canvas id="gallery"></canvas>
          </div>
        </div>
        <div class="wide">
          <div class="panel">
            <canvas id="metric-heatmap"></canvas>
          </div>
          <div class="panel">
            <canvas id="baseline-heatmap"></canvas>
          </div>
        </div>
      </section>
    </main>

    <script type="module">
      import { MetricProcessCurveApp, loadMetricEvidence } from "../../src/metric-visual.js?v=miniature-stage-6";

      const app = new MetricProcessCurveApp({
        scene: document.getElementById("scene"),
        gallery: document.getElementById("gallery"),
        query: document.getElementById("query"),
        metricHeatmap: document.getElementById("metric-heatmap"),
        baselineHeatmap: document.getElementById("baseline-heatmap"),
        domainSelect: document.getElementById("domain"),
        morphSlider: document.getElementById("morph"),
        morphToggle: document.getElementById("morph-toggle"),
      });

      const evidence = await loadMetricEvidence("../../../docs/examples/assets/process-curve-external/evidence.json");
      app.load(evidence);
    </script>
  </body>
</html>
