<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>METRIC Visual — Record Preview Contract</title>
  <style>
    :root { color-scheme: light; --ink: #223039; --muted: #5a6a70; --border: rgba(46, 62, 61, 0.16); }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body { background: radial-gradient(circle at 40% 24%, #f3f1e6, #d9ddd0 70%); font: 13px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); }
    main { max-width: 980px; margin: 0 auto; padding: 40px 28px 80px; }
    h1 { margin: 0 0 4px; font-size: 19px; font-weight: 740; }
    p.sub { margin: 0 0 26px; color: var(--muted); max-width: 64ch; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .chip { padding: 14px 15px; border: 1px solid var(--border); border-radius: 14px; background: rgba(252, 251, 240, 0.7); cursor: pointer; transition: transform 120ms ease, box-shadow 120ms ease; }
    .chip:hover, .chip:focus-visible { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(55, 65, 60, 0.16); outline: none; }
    .chip .type { font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .chip .label { margin-top: 5px; font-weight: 680; }
    .chip .dot { width: 11px; height: 11px; border-radius: 4px; display: inline-block; margin-right: 7px; vertical-align: -1px; }
    .loading, .error { padding: 40px; color: #2a3a3a; }
    .error { color: #7a2222; }
  </style>
</head>
<body>
  <main>
    <h1>Record preview contract</h1>
    <p class="sub">Every point in a metric-space scene is an entry point back to its original record. The same generic preview resolver renders text, numeric arrays, time series, histograms, image references and composed records. Hover a record.</p>
    <div class="grid" id="grid"></div>
  </main>

  <script type="module">
    import { RecordPreviewPanel } from "../../src/interaction/record-preview.js";

    const TYPE_COLORS = { string: "#3389c6", vector: "#1aab99", time_series_window: "#f28a2e", histogram: "#765ab8", image: "#e0474f", composed: "#577590" };
    const grid = document.getElementById("grid");
    const preview = new RecordPreviewPanel({ root: document.body, maxFields: 8 });

    // Generic, type-aware preview resolver — the same path a scene would use.
    function resolvePreview(record) {
      const payload = record.payload || {};
      const out = { title: record.label || record.id, subtitle: `${record.record_type} · ${record.id}`, fields: [], series: [] };
      if (payload.kind === "string") out.fields.push({ label: "text", value: payload.text });
      else if (payload.kind === "vector") (payload.names || payload.values).forEach((n, i) => out.fields.push({ label: payload.names ? n : `v${i}`, value: payload.values[i] }));
      else if (payload.kind === "time_series") out.series.push({ values: payload.series, color: TYPE_COLORS.time_series_window });
      else if (payload.kind === "histogram") out.series.push({ values: payload.bins, color: TYPE_COLORS.histogram });
      else if (payload.kind === "image_ref") { out.fields.push({ label: "image", value: payload.href }); out.fields.push({ label: "size", value: `${payload.width}×${payload.height}` }); }
      else if (payload.kind === "composed") payload.parts.forEach((part) => out.fields.push({ label: part.label, value: part.kind === "vector" ? part.values : part.text }));
      return out;
    }

    try {
      const response = await fetch("./records.json");
      if (!response.ok) throw new Error(`records ${response.status}`);
      const records = (await response.json()).records;
      preview.setResolver((input) => resolvePreview(input.record));

      for (const record of records) {
        const chip = document.createElement("button");
        chip.className = "chip";
        chip.type = "button";
        chip.innerHTML = `<div class="type"><span class="dot" style="background:${TYPE_COLORS[record.record_type] || "#577590"}"></span>${record.record_type}</div><div class="label">${record.label}</div>`;
        const show = (event) => preview.show({ record, x: event.clientX ?? (chip.getBoundingClientRect().right), y: event.clientY ?? chip.getBoundingClientRect().top });
        chip.addEventListener("pointermove", show);
        chip.addEventListener("focus", show);
        chip.addEventListener("pointerleave", () => preview.hide());
        grid.appendChild(chip);
      }

      document.documentElement.dataset.metricPreviewContract = "ready";
      document.documentElement.dataset.metricRecordCount = String(records.length);
      window.metricPreviewContract = { records, resolvePreview };
    } catch (error) {
      console.error(error);
      grid.innerHTML = `<div class="error">${error instanceof Error ? error.message : String(error)}</div>`;
    }
  </script>
</body>
</html>
