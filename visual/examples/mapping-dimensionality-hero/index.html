<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>METRIC Visual — Mapping &amp; Dimensionality Preview</title>
  <style>
    :root { color-scheme: light; --ink: #223039; --muted: #54636b; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: radial-gradient(circle at 48% 42%, rgba(255, 252, 238, 0.82), rgba(230, 236, 231, 0.96) 62%, #dfe6e1 100%); font: 12px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); }
    main { position: fixed; inset: 0; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas:active { cursor: grabbing; }
    .caption { position: absolute; left: 26px; top: 24px; max-width: 440px; pointer-events: none; text-shadow: 0 1px 16px rgba(255, 255, 255, 0.6); }
    .caption h1 { margin: 0 0 7px; font-size: 17px; font-weight: 700; }
    .caption p { margin: 0; font-size: 12px; line-height: 1.5; color: rgba(52, 66, 74, 0.82); max-width: 52ch; }
    .legend { position: absolute; left: 26px; bottom: 22px; display: flex; gap: 14px; align-items: center; color: var(--muted); }
    .legend .ramp { width: 168px; height: 9px; border-radius: 5px; background: linear-gradient(90deg, #1f3a5c, #1f9388, #f0a047, #d94f3a); }
    .phase { position: absolute; right: 24px; bottom: 22px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; font-size: 10.5px; }
    .loading, .error { position: absolute; inset: 0; display: grid; place-items: center; color: #2a3a3a; }
    .error { color: #7a2222; }
  </style>
</head>
<body>
  <main>
    <canvas id="scene" aria-label="Mapping morph: 2D projection lifting into a 3D metric space"></canvas>
    <section class="caption" aria-hidden="true">
      <h1>Mapping &amp; dimensionality</h1>
      <p>Native mapping evidence rendered as a coordinate-state morph. The 2D PHATE target lifts into the 3D source-space view; color is the exported local mapping distortion.</p>
    </section>
    <div class="legend"><span>preserved</span><div class="ramp"></div><span>distorted</span></div>
    <div class="phase" id="phase">2D ⇄ 3D morph</div>
    <div class="loading" id="loading">Loading mapping evidence…</div>
  </main>

  <script type="module">
    import { createMetricVisual } from "../../src/index.js";

    const canvas = document.getElementById("scene");
    const loading = document.getElementById("loading");
    const phaseEl = document.getElementById("phase");
    const params = new URLSearchParams(location.search);
    const morphParam = params.get("morph");
    const staticMorph = morphParam == null ? null : Math.max(0, Math.min(1, Number(morphParam)));

    try {
      const response = await fetch("../../../docs/examples/assets/mapping-dimensionality/metric.visual.json");
      if (!response.ok) throw new Error(`evidence ${response.status}`);
      const document_ = await response.json();

      const visual = await createMetricVisual({
        canvas,
        evidence: document_,
        profileId: "mapping-dimensionality-hero-profile",
      });
      visual.showMapping({
        sourceCoordinateId: "phate-target-2d",
        targetCoordinateId: "source-feature-layout-3d",
        residualProperty: "local-mapping-distortion",
        residualVectors: false,
        labels: "process-family",
        loop: staticMorph == null,
        progress: staticMorph ?? 0,
        morphDurationMs: 6400,
        pointSize: 1.6,
        preview: "record",
      });
      const state = visual.getState();
      const layerIds = state.descriptors.map((descriptor) => descriptor.id);
      const residualLayers = state.descriptors.filter((descriptor) => descriptor.metadata?.role === "residual/error");
      if (staticMorph != null) phaseEl.textContent = staticMorph < 0.2 ? "source (2D)" : staticMorph > 0.8 ? "target (3D)" : "transition";

      document.documentElement.dataset.metricMappingHero = "ready";
      document.documentElement.dataset.metricRecordCount = String(visual.views[0].recordIds.length);
      document.documentElement.dataset.metricCoordinateIds = "phate-target-2d,source-feature-layout-3d";
      document.documentElement.dataset.metricTimelineIds = "";
      document.documentElement.dataset.metricLayerIds = layerIds.join(",");
      document.documentElement.dataset.metricResidualLayers = residualLayers.map((descriptor) => descriptor.id).join(",");
      document.documentElement.dataset.metricMorph = staticMorph == null ? "coordinate-morph-loop" : `static-${staticMorph}`;
      window.metricMappingHero = { visual, runtime: visual.runtime, getState: () => visual.getState() };

      loading.remove();
      addEventListener("resize", () => { const r = canvas.getBoundingClientRect(); visual.runtime.resize(Math.max(1, Math.floor(r.width)), Math.max(1, Math.floor(r.height))); });
    } catch (error) {
      console.error(error);
      loading.className = "loading error";
      loading.textContent = error instanceof Error ? error.message : String(error);
    }
  </script>
</body>
</html>
