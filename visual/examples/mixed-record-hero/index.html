<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>METRIC Visual — Mixed-Record Preview</title>
  <style>
    :root { color-scheme: light; --ink: #223039; --muted: #54636b; --panel: rgba(245, 248, 244, 0.78); --border: rgba(212, 222, 222, 0.6); }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: radial-gradient(circle at 48% 42%, rgba(255, 252, 238, 0.82), rgba(230, 236, 231, 0.96) 62%, #dfe6e1 100%); font: 12px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); }
    main { position: fixed; inset: 0; }
    canvas#scene { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }
    .caption { position: absolute; left: 26px; top: 24px; max-width: 430px; pointer-events: none; text-shadow: 0 1px 16px rgba(255, 255, 255, 0.6); }
    .caption h1 { margin: 0 0 7px; font-size: 17px; font-weight: 700; }
    .caption p { margin: 0; font-size: 12px; line-height: 1.5; color: rgba(52, 66, 74, 0.82); max-width: 50ch; }
    .legend { position: absolute; left: 26px; bottom: 22px; display: flex; flex-wrap: wrap; gap: 13px; color: var(--muted); }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .legend i { width: 11px; height: 11px; border-radius: 3px; }
    .loading, .error { position: absolute; inset: 0; display: grid; place-items: center; color: #2a3a3a; }
    .error { color: #7a2222; }
  </style>
</head>
<body>
  <main>
    <canvas id="scene" aria-label="Mixed-record metric space"></canvas>
    <section class="caption" aria-hidden="true">
      <h1>Mixed-record metric space</h1>
      <p>Composed native fixture records are compared in one finite metric space through type-appropriate metrics. Glyph color is the exported record family; edges are selected from the same composite metric relation.</p>
    </section>
    <div class="legend" id="legend"></div>
    <div class="loading" id="loading">Loading mixed-record evidence…</div>
  </main>

  <script type="module">
    import { createMetricVisual } from "../../src/index.js";

    const EVIDENCE_URL = "../../../docs/examples/assets/mixed-records/metric.visual.json";
    const PALETTE = ["#3389c6", "#1aab99", "#f28a2e", "#765ab8", "#e0474f", "#8a9a2a"];
    let FAMILY_COLORS = {};
    let FAMILIES = [];

    const canvas = document.getElementById("scene");
    const loading = document.getElementById("loading");
    const legend = document.getElementById("legend");
    const familyById = new Map();

    function buildLegend() {
      legend.replaceChildren(...FAMILIES.map((name) => {
        const span = document.createElement("span");
        const i = document.createElement("i"); i.style.background = FAMILY_COLORS[name];
        span.append(i, document.createTextNode(name));
        return span;
      }));
    }

    function fit(runtime) { const r = canvas.getBoundingClientRect(); runtime.resize(Math.max(1, Math.floor(r.width)), Math.max(1, Math.floor(r.height))); }

    try {
      const response = await fetch(EVIDENCE_URL);
      if (!response.ok) throw new Error(`evidence ${response.status}`);
      const document_ = await response.json();
      for (const p of document_.properties) {
        if (p.id === "family") {
          for (const v of p.values) familyById.set(String(v.record_id), v.value);
        }
      }
      FAMILIES = Array.from(new Set(familyById.values())).sort();
      FAMILY_COLORS = Object.fromEntries(FAMILIES.map((name, index) => [name, PALETTE[index % PALETTE.length]]));
      buildLegend();

      const visual = await createMetricVisual({
        canvas,
        evidence: document_,
        profileId: "mixed-record-hero-profile",
      });
      visual.showMixedRecords({
        coordinateId: "mixed-finite-records-family-severity-3d",
        glyphBy: "family",
        labels: "family",
        relationId: "mixed-finite-records-composite-metric",
        crossTypeRelations: true,
        topK: 5,
        preview: "text image curve table",
        pointSize: 1.4,
      });

      document.documentElement.dataset.metricMixedHero = "ready";
      document.documentElement.dataset.metricRecordCount = String(visual.views[0].recordIds.length);
      window.metricMixedHero = { visual, runtime: visual.runtime, getState: () => visual.getState() };

      loading.remove();
      addEventListener("resize", () => fit(visual.runtime));
    } catch (error) {
      console.error(error);
      loading.className = "loading error";
      loading.textContent = error instanceof Error ? error.message : String(error);
    }
  </script>
</body>
</html>
