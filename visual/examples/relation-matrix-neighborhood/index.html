<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>METRIC Visual — Relation Matrix &amp; Neighborhood</title>
  <style>
    :root { color-scheme: light; --ink: #223039; --muted: #54636b; --panel: rgba(245, 248, 244, 0.82); --border: rgba(212, 222, 222, 0.62); }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: radial-gradient(circle at 46% 42%, rgba(255, 252, 238, 0.82), rgba(230, 236, 231, 0.96) 62%, #dfe6e1 100%); font: 12px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); }
    main { position: fixed; inset: 0; }
    canvas#scene { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }
    .caption { position: absolute; left: 26px; top: 24px; max-width: 420px; pointer-events: none; text-shadow: 0 1px 16px rgba(255, 255, 255, 0.6); }
    .caption h1 { margin: 0 0 7px; font-size: 17px; font-weight: 700; }
    .caption p { margin: 0; font-size: 12px; line-height: 1.5; color: rgba(52, 66, 74, 0.82); max-width: 50ch; }
    .matrix-label { position: absolute; right: 30px; top: 24px; color: var(--muted); font-weight: 700; font-size: 11.5px; }
    .loading, .error { position: absolute; inset: 0; display: grid; place-items: center; color: #2a3a3a; }
    .error { color: #7a2222; }
  </style>
</head>
<body>
  <main>
    <canvas id="scene" aria-label="Metric space with relation matrix and neighborhood"></canvas>
    <section class="caption" aria-hidden="true">
      <h1>Relation matrix &amp; neighborhood</h1>
      <p>The native metric relation is rendered as a spatial graph and a dense matrix. The same exported pair values drive both views; hover the matrix to read a pair.</p>
    </section>
    <div class="matrix-label" id="matrix-label">dense metric matrix</div>
    <div class="loading" id="loading">Loading relation evidence…</div>
  </main>

  <script type="module">
    import { createMetricVisual } from "../../src/index.js";

    const MATRIX_RECT = [0.635, 0.30, 0.33, 0.44];
    const canvas = document.getElementById("scene");
    const loading = document.getElementById("loading");
    const matrixLabel = document.getElementById("matrix-label");

    try {
      const response = await fetch("../../../docs/examples/assets/relation-matrix/metric.visual.json");
      if (!response.ok) throw new Error(`evidence ${response.status}`);
      const document_ = await response.json();

      const visual = await createMetricVisual({
        canvas,
        evidence: document_,
        profileId: "relation-matrix-neighborhood-profile",
      });
      visual.showRelationMatrixNeighborhood({
        coordinateId: "process-curve-block-layout-3d",
        relationId: "process-curve-aligned-metric",
        matrixRect: MATRIX_RECT,
        symmetric: true,
        colorProperty: "process-family",
        labels: "process-family",
        graph: "neighborhood",
        pairPreview: true,
        pointSize: 2.0,
      });

      const matrixDescriptor = visual.descriptors.find((descriptor) => descriptor.primitive === "RelationMatrixLayer");
      const matrixData = matrixDescriptor.metadata.matrix;
      matrixLabel.textContent = `dense metric matrix · ${matrixData.size}²`;

      document.documentElement.dataset.metricRelationHero = "ready";
      document.documentElement.dataset.metricRecordCount = String(visual.views.find((view) => view.kind === "neighborhood-graph")?.recordIds.length || 0);
      document.documentElement.dataset.metricMatrixSize = String(matrixData.size);
      window.metricRelationHero = { visual, runtime: visual.runtime, getState: () => visual.getState() };

      loading.remove();
      addEventListener("resize", () => { const r = canvas.getBoundingClientRect(); visual.runtime.resize(Math.max(1, Math.floor(r.width)), Math.max(1, Math.floor(r.height))); });
    } catch (error) {
      console.error(error);
      loading.className = "loading error";
      loading.textContent = error instanceof Error ? error.message : String(error);
    }
  </script>
</body>
</html>
