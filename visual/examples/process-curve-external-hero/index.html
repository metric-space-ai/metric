<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>METRIC Visual - External Process Curves</title>
  <style>
    :root { color-scheme: light; --ink: #203038; --muted: #52656d; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      background: radial-gradient(circle at 48% 40%, rgba(248, 250, 246, 0.92), rgba(224, 232, 229, 0.98) 64%, #d6dfdc 100%);
      color: var(--ink);
      font: 12px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { position: fixed; inset: 0; }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }
    .caption {
      position: absolute;
      left: 26px;
      top: 24px;
      max-width: 450px;
      pointer-events: none;
      text-shadow: 0 1px 16px rgba(255, 255, 255, 0.62);
    }
    .caption h1 { margin: 0 0 7px; font-size: 17px; line-height: 1.2; font-weight: 700; letter-spacing: 0; }
    .caption p { margin: 0; max-width: 54ch; color: rgba(54, 69, 76, 0.84); }
    .matrix-label {
      position: absolute;
      right: 30px;
      top: 24px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
      pointer-events: none;
    }
    .loading, .error {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #2b3b40;
    }
    .error { color: #7a2222; }
  </style>
</head>
<body>
  <main>
    <canvas id="scene" aria-label="External process-curve aligned metric relation"></canvas>
    <section class="caption" aria-hidden="true">
      <h1>Process curve recovery</h1>
      <p>Aligned curve relations recover the matching operating state where a padded-vector baseline follows the wrong window.</p>
    </section>
    <div class="matrix-label" id="matrix-label">aligned metric matrix</div>
    <div class="loading" id="loading">Loading process-curve evidence...</div>
  </main>

  <script type="module">
    import { createMetricVisual } from "../../src/index.js";

    const canvas = document.getElementById("scene");
    const loading = document.getElementById("loading");
    const matrixLabel = document.getElementById("matrix-label");

    try {
      const response = await fetch("../../../docs/examples/assets/process-curve-external/metric.visual.json");
      if (!response.ok) throw new Error(`evidence ${response.status}`);
      const document_ = await response.json();

      const visual = await createMetricVisual({
        canvas,
        evidence: document_,
        profileId: "process-curve-external-hero-profile",
      });
      visual.showProcessCurves({
        coordinateId: "process-curve-external-landmark-3d",
        relationId: "process-curve-external-aligned-metric",
        graphId: "process-curve-external-knn",
        labelPropertyId: "process-role",
        includeMatrix: true,
        matrixRect: [0.61, 0.25, 0.35, 0.50],
        symmetric: true,
        preview: "pair",
        topK: 4,
        pointSize: 1.55,
      });

      const matrixDescriptor = visual.descriptors.find((descriptor) => descriptor.primitive === "RelationMatrixLayer");
      const matrixData = matrixDescriptor?.metadata?.matrix;
      matrixLabel.textContent = matrixData ? `aligned metric matrix · ${matrixData.size}²` : "aligned metric matrix";

      document.documentElement.dataset.metricProcessCurveExternalHero = "ready";
      document.documentElement.dataset.metricRecordCount = String(document_.records.filter((record) => record.record_type === "process_curve_source").length);
      document.documentElement.dataset.metricRelationId = "process-curve-external-aligned-metric";
      document.documentElement.dataset.metricCommand = "showProcessCurves";
      window.metricProcessCurveExternalHero = { visual, runtime: visual.runtime, getState: () => visual.getState() };

      loading.remove();
      addEventListener("resize", () => {
        const rect = canvas.getBoundingClientRect();
        visual.runtime.resize(Math.max(1, Math.floor(rect.width)), Math.max(1, Math.floor(rect.height)));
      });
    } catch (error) {
      console.error(error);
      loading.className = "loading error";
      loading.textContent = error instanceof Error ? error.message : String(error);
    }
  </script>
</body>
</html>
