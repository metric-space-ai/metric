<!doctype html>
<html lang="en" data-metric-visual-surface="internal-diagnostic-harness" data-metric-visual-public-gallery="false" data-metric-visual-direct-runtime="allowed-dev-probe">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="metric-visual-surface" content="internal-diagnostic-harness">
  <meta name="metric-visual-public-gallery" content="false">
  <link rel="icon" href="data:,">
  <title>METRIC Visual Internal Native Engine Probe</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101419;
      color: #e6edf2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #edf0ec;
    }

    main {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .hud {
      position: absolute;
      left: 20px;
      top: 18px;
      max-width: 520px;
      pointer-events: none;
      color: #243039;
      text-shadow: 0 1px 12px rgba(255, 255, 255, 0.45);
      opacity: 0;
      transition: opacity 180ms ease-out;
    }

    .hud h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .hud p {
      margin: 0;
      max-width: 58ch;
      font-size: 13px;
      line-height: 1.45;
      color: #41505a;
    }

    .status {
      position: absolute;
      right: 16px;
      bottom: 14px;
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid rgba(215, 228, 234, 0.22);
      background: rgba(13, 17, 21, 0.72);
      color: #d7e4ea;
      font-size: 12px;
      line-height: 1.5;
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 180ms ease-out;
    }

    main:hover .hud,
    main:hover .status,
    main:focus-within .hud,
    main:focus-within .status {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main>
    <canvas id="metric-canvas" aria-label="METRIC internal native WebGL diagnostic visualization"></canvas>
    <section class="hud" aria-hidden="true">
      <h1>METRIC Visual Internal Diagnostic</h1>
      <p>Dev-only direct-runtime probe for process-curve miniature rendering, GPU picking, and style diagnostics.</p>
    </section>
    <output class="status" id="status">booting</output>
  </main>

  <script type="module">
    import {
      MetricVisualRuntime,
      adaptMetricEvidenceV1,
      createLayerFromDescriptor,
      createMiniaturePhotographicStyle,
      createMiniatureStyleProfile,
      createProcessCurveMiniatureSceneBundle,
      createProcessCurveMiniatureStage,
    } from "../../src/index.js";

    const canvas = document.getElementById("metric-canvas");
    const status = document.getElementById("status");
    const probeMetadata = Object.freeze({
      id: "native-engine-probe",
      surface: "internal-diagnostic-harness",
      publicGallery: false,
      directRuntime: "allowed-dev-probe",
      reason: "Exercises MetricVisualRuntime/style internals without presenting a public METRIC Visual API example.",
    });
    window.metricVisualProbeMetadata = probeMetadata;

    function writeStatus(lines) {
      status.innerHTML = lines.map((line) => `<div>${line}</div>`).join("");
    }

    function fitCanvas() {
      const rect = canvas.getBoundingClientRect();
      runtime.resize(Math.max(1, Math.floor(rect.width)), Math.max(1, Math.floor(rect.height)));
    }

    const initialStage = createProcessCurveMiniatureStage({
      variant: "white",
      focus: {
        axis: "horizontal",
        yRatio: 0.5,
        radiusRatio: 0.3,
        focusBandRatio: 0.07,
        blurRadius: 5.4,
        blurCurve: 1.42,
      },
    });

    const miniatureProfile = createMiniatureStyleProfile({
      id: "process-curve-native-probe-miniature-profile",
      stage: initialStage,
      styleMotion: {
        mode: "focus-breath",
        focus: {
          yAmplitude: 0.01,
          radiusAmplitude: 0.018,
        },
        postprocess: {
          frameAmountAmplitude: 0.01,
          focusLiftAmplitude: 0.003,
        },
      },
    });
    const style = createMiniaturePhotographicStyle({
      profile: miniatureProfile,
      layerFactory: createLayerFromDescriptor,
    });
    const runtimeSetup = style.createRuntimeOptions({ canvas });
    const runtime = new MetricVisualRuntime(runtimeSetup.runtimeOptions);
    style.attachRuntime(runtime);

    window.metricVisualProbe = runtime;
    window.metricVisualStyle = style;
    window.metricVisualStyleProfile = style.toProfile({ includeDiagnostics: true });

    try {
      const response = await fetch("/docs/examples/assets/process-curve-external/evidence.json");
      if (!response.ok) throw new Error(`evidence ${response.status}`);
      const evidence = await response.json();
      const document = adaptMetricEvidenceV1(evidence);
      const datasetId = "power_demand";

      runtime.setDocument(document, { views: false });
      fitCanvas();
      const scene = createProcessCurveMiniatureSceneBundle(document, {
        datasetId,
        stage: style.stage,
        morphLoop: true,
        trackMode: "tube",
        trackRadius: 0.012,
        trackRadialSegments: 8,
        trackAlpha: 0.9,
      });
      style.applyBundle(runtime, scene.bundle, { source: "native-engine-probe" });
      window.metricVisualStyleProfile = style.toProfile({ includeDiagnostics: true });
      runtime.start();

      writeStatus([
        `schema: ${document.schema}`,
        `records: ${scene.inputs.records.length}`,
        `layers: ${runtime.getState().layerInstanceCount}`,
        `state: ${runtime.getState().layerState.status}`,
      ]);
    } catch (error) {
      console.error(error);
      writeStatus([`error: ${error.message}`]);
    }

    addEventListener("resize", fitCanvas);
  </script>
</body>
</html>
