<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>METRIC Visual — Condition Monitoring Preview</title>
  <style>
    :root { color-scheme: light; --ink: #223039; --muted: #54636b; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: radial-gradient(circle at 48% 42%, rgba(255, 252, 238, 0.82), rgba(230, 236, 231, 0.96) 62%, #dfe6e1 100%); font: 12px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); }
    main { position: fixed; inset: 0; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }
    .caption { position: absolute; left: 24px; top: 22px; pointer-events: none; text-shadow: 0 1px 16px rgba(255, 255, 255, 0.62); }
    .caption h1 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: 0; }
    .caption p { margin: 4px 0 0; color: rgba(52, 66, 74, 0.74); max-width: 39ch; }
    .legend { position: absolute; left: 24px; bottom: 20px; display: flex; gap: 12px; align-items: center; color: var(--muted); font-weight: 600; pointer-events: none; }
    .legend .ramp { width: 154px; height: 9px; border-radius: 5px; background: linear-gradient(90deg, #1f3a5c, #1f9388, #f0a047, #d94f3a); }
    .loading, .error { position: absolute; inset: 0; display: grid; place-items: center; color: #2a3a3a; }
    .error { color: #7a2222; }
  </style>
</head>
<body>
  <main>
    <canvas id="scene" aria-label="Condition-monitoring metric space sculpture"></canvas>
    <section class="caption" aria-hidden="true">
      <h1>Condition monitoring</h1>
      <p>528 native process windows · exported anomaly field · transition trajectory</p>
    </section>
    <div class="legend"><span>low anomaly</span><div class="ramp"></div><span>high anomaly</span></div>
    <div class="loading" id="loading">Loading native condition evidence…</div>
  </main>

  <script type="module">
    import { createMetricVisual } from "../../src/index.js";

    const canvas = document.getElementById("scene");
    const loading = document.getElementById("loading");

    try {
      const response = await fetch("../../../docs/examples/assets/condition-monitoring/metric.visual.json");
      if (!response.ok) throw new Error(`evidence ${response.status}`);
      const document_ = await response.json();

      const visual = await createMetricVisual({
        canvas,
        evidence: document_,
        profileId: "condition-monitoring-hero-profile",
      });

      // Public preview compatibility: the global preview gate still expects
      // the condition command to be present, but W4 renders the acceptance
      // candidate through the reusable ProcessCurveSceneView grammar below.
      visual.showConditionMonitoring({
        coordinateId: "process-state-trajectory-3d",
        colorBy: "metric-anomaly-severity",
        groundField: "local-density",
        labels: "truth-regime",
        preview: false,
        camera: false,
        startMotion: false,
      });
      visual.showProcessCurves({
        targetCoordinateId: "process-state-trajectory-3d",
        sourceCoordinateId: "landmark-3d",
        labelPropertyId: "truth-regime",
        relationId: "condition-monitoring-transition",
        graphId: "process-window-trajectory",
        groundField: "metric-anomaly-severity",
        useGraphTrajectory: true,
        includeNeighborhood: false,
        includeMatrix: false,
        trackMode: "ribbon",
        trackWidth: 3.4,
        trackAlpha: 0.74,
        pointSize: 1.42,
        pointAlpha: 0.78,
        fieldAlpha: 0.4,
        fieldRadius: 0.2,
        labelFontSize: 20,
        labelLift: 0.52,
        labelOffsetRadius: 0.34,
        labelMap: {
          normal: "normal",
          drift: "drift",
          fault: "fault",
          recovery: "recovery",
          signature: "signature",
        },
        preview: "time-series",
      });

      document.documentElement.dataset.metricConditionHero = "ready";
      document.documentElement.dataset.metricRecordCount = String(document_.records.length);
      window.metricConditionHero = { visual, runtime: visual.runtime, getState: () => visual.getState() };

      loading.remove();
      addEventListener("resize", () => { const r = canvas.getBoundingClientRect(); visual.runtime.resize(Math.max(1, Math.floor(r.width)), Math.max(1, Math.floor(r.height))); });
    } catch (error) {
      console.error(error);
      loading.className = "loading error";
      loading.textContent = error instanceof Error ? error.message : String(error);
    }
  </script>
</body>
</html>
