<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>METRIC Visual Miniature Frame</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef1ed;
      color: #223039;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 48% 42%, rgba(255, 252, 238, 0.8), rgba(230, 236, 231, 0.96) 62%, #dfe6e1 100%);
    }

    main {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .caption,
    .status {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms ease-out;
    }

    .caption {
      left: 24px;
      top: 22px;
      max-width: 460px;
      color: rgba(24, 34, 41, 0.86);
      text-shadow: 0 1px 18px rgba(255, 255, 255, 0.6);
    }

    .caption h1 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0;
    }

    .caption p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(52, 66, 74, 0.78);
    }

    .status {
      right: 18px;
      bottom: 16px;
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid rgba(212, 222, 222, 0.62);
      background: rgba(245, 248, 244, 0.68);
      color: rgba(37, 50, 58, 0.82);
      font-size: 12px;
      line-height: 1.5;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 44px rgba(77, 92, 97, 0.1);
    }

    body.metric-inspect main:hover .caption,
    body.metric-inspect main:hover .status,
    body.metric-inspect main:focus-within .caption,
    body.metric-inspect main:focus-within .status {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main>
    <canvas id="metric-canvas" aria-label="METRIC process-curve miniature visualization"></canvas>
    <section class="caption" aria-hidden="true">
      <h1>Finite metric-space process curve</h1>
      <p>One full-frame native render: staged records, semantic floor projection, contact shadows, focus plane, and slow studio drift.</p>
    </section>
    <output class="status" id="status">booting</output>
  </main>

  <script type="module">
    import {
      attachMiniatureRigReporter,
      createMetricVisual,
    } from "../../src/index.js";

    const canvas = document.getElementById("metric-canvas");
    const status = document.getElementById("status");
    const params = new URLSearchParams(location.search);
    if (params.get("inspect") === "1" || params.get("debug") === "1") {
      document.body.classList.add("metric-inspect");
    }

    let visual = null;
    let rigReporter = null;
    let currentScene = null;

    function writeStatus(lines) {
      status.innerHTML = lines.map((line) => `<div>${escapeHtml(line)}</div>`).join("");
    }

    function fitCanvas() {
      if (!visual) return;
      const rect = canvas.getBoundingClientRect();
      visual.runtime.resize(Math.max(1, Math.floor(rect.width)), Math.max(1, Math.floor(rect.height)));
    }

    try {
      const response = await fetch("/docs/examples/assets/process-curve-external/metric.visual.json");
      if (!response.ok) throw new Error(`evidence ${response.status}`);
      const document_ = await response.json();
      const datasetId = "process-curve-external";

      visual = await createMetricVisual({
        canvas,
        evidence: document_,
        profileId: "process-curve-miniature-hero-frame-profile",
        profileOptions: {
          styleMotion: {
            camera: {
              yawAmplitude: 0.014,
              pitchAmplitude: 0.005,
            },
            focus: {
              yAmplitude: 0.01,
              radiusAmplitude: 0.018,
            },
          },
        },
        controls: {
          enabled: true,
          rotateSpeed: 0.0045,
        },
        hoverFocus: {
          enabled: true,
          thresholdPx: 54,
          throttleMs: 28,
          clearOnLeave: false,
          clearOnMiss: false,
          positionChannels: ["position", "targetPosition"],
        },
      });
      fitCanvas();

      visual.showProcessCurves({
        datasetId,
        sourceCoordinateId: "process-curve-external-landmark-2d",
        coordinateId: "process-curve-external-landmark-3d",
        relationId: "process-curve-external-aligned-metric",
        graphId: "process-curve-external-knn",
        labelPropertyId: "process-role",
        groundY: visual.setup.stage?.grounding?.groundY,
        morphLoop: true,
        pointSize: 1.85,
        projectionSize: 2.85,
        trackMode: "tube",
        trackRadius: 0.012,
        trackRadialSegments: 8,
        trackAlpha: 0.92,
        preview: false,
      });

      const inputs = visual.views[0]?.inputs || {};
      const focusRecord = inputs.records?.[Math.floor((inputs.records?.length || 0) * 0.58)];
      const focusPosition = focusPointForRecord(inputs, visual.setup.stage?.grounding?.groundY, focusRecord?.id);
      if (focusPosition) {
        visual.runtime.setFocusTarget({
          type: "point",
          source: "miniature-hero-frame-record",
          recordId: focusRecord.id,
          coordinateId: inputs.targetCoordinate?.id,
          position: focusPosition,
        });
      }

      currentScene = {
        schema: "metric.visual.public_command_scene_state.v1",
        stage: visual.setup.stage,
        layers: visual.descriptors,
        metadata: {
          example: "process-curve-miniature-hero-frame",
          datasetId,
          command: "showProcessCurves",
        },
      };
      rigReporter = attachMiniatureRigReporter({
        target: document.documentElement,
        resolve: () => ({
          runtime: visual.runtime,
          style: visual.setup.style,
          stage: visual.setup.stage,
          bundle: currentScene,
          descriptors: visual.descriptors,
        }),
      });
      visual.runtime.renderOnce();

      window.metricHeroFrame = {
        visual,
        runtime: visual.runtime,
        style: visual.setup.style,
        profile: visual.setup.style.toProfile({ includeDiagnostics: true }),
        stage: visual.setup.stage,
        scene: currentScene,
        inputs,
        focusRecordId: focusRecord?.id || null,
        focusPosition,
        rigReporter,
        getState: () => visual.getState(),
      };
      rigReporter.publish();
      requestAnimationFrame(rigReporter.publish);

      writeStatus([
        `schema: ${document_.schema}`,
        `records: ${inputs.records?.length || 0}`,
        `layers: ${visual.runtime.getState().layerInstanceCount}`,
        `state: ${visual.runtime.getState().layerState?.status || "ready"}`,
      ]);
    } catch (error) {
      console.error(error);
      writeStatus([`error: ${error.message}`]);
    }

    addEventListener("resize", fitCanvas);
    addEventListener("keydown", (event) => {
      if (event.key === "i" || event.key === "I") {
        document.body.classList.toggle("metric-inspect");
      }
    });

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function focusPointForRecord(inputs, groundY, recordId) {
      const entry = (inputs.targetCoordinate?.record_positions || []).find((position) => position.record_id === recordId);
      const values = entry?.position || [];
      if (!entry || values.length < 2) return null;
      return [
        Number(values[0]) || 0,
        Number.isFinite(Number(groundY)) ? Number(groundY) + 0.06 : -0.52,
        Number(values[2] ?? values[1]) || 0,
      ];
    }
  </script>
</body>
</html>
