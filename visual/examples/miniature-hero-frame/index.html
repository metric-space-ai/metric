<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>METRIC Visual Miniature Frame</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef1ed;
      color: #223039;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 48% 42%, rgba(255, 252, 238, 0.8), rgba(230, 236, 231, 0.96) 62%, #dfe6e1 100%);
    }

    main {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .caption,
    .status {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms ease-out;
    }

    .caption {
      left: 24px;
      top: 22px;
      max-width: 460px;
      color: rgba(24, 34, 41, 0.86);
      text-shadow: 0 1px 18px rgba(255, 255, 255, 0.6);
    }

    .caption h1 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0;
    }

    .caption p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(52, 66, 74, 0.78);
    }

    .status {
      right: 18px;
      bottom: 16px;
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid rgba(212, 222, 222, 0.62);
      background: rgba(245, 248, 244, 0.68);
      color: rgba(37, 50, 58, 0.82);
      font-size: 12px;
      line-height: 1.5;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 44px rgba(77, 92, 97, 0.1);
    }

    body.metric-inspect main:hover .caption,
    body.metric-inspect main:hover .status,
    body.metric-inspect main:focus-within .caption,
    body.metric-inspect main:focus-within .status {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main>
    <canvas id="metric-canvas" aria-label="METRIC process-curve miniature visualization"></canvas>
    <section class="caption" aria-hidden="true">
      <h1>Finite metric-space process curve</h1>
      <p>One full-frame native render: staged records, semantic floor projection, contact shadows, focus plane, and slow studio drift.</p>
    </section>
    <output class="status" id="status">booting</output>
  </main>

  <script type="module">
    import {
      MetricVisualRuntime,
      adaptMetricEvidenceV1,
      attachMiniatureRigReporter,
      createLayerFromDescriptor,
      createMiniatureHeroRuntimeOptions,
      createMiniatureHeroSceneBundle,
      createProcessCurveMiniatureLayerDescriptors,
    } from "../../src/index.js";

    const canvas = document.getElementById("metric-canvas");
    const status = document.getElementById("status");
    const params = new URLSearchParams(location.search);
    if (params.get("inspect") === "1" || params.get("debug") === "1") {
      document.body.classList.add("metric-inspect");
    }

    const setup = createMiniatureHeroRuntimeOptions({
      canvas,
      layerFactory: createLayerFromDescriptor,
      profileOptions: {
        id: "process-curve-miniature-hero-frame-profile",
        styleMotion: {
          camera: {
            yawAmplitude: 0.014,
            pitchAmplitude: 0.005,
          },
          focus: {
            yAmplitude: 0.01,
            radiusAmplitude: 0.018,
          },
        },
      },
	      controls: {
	        enabled: true,
	        rotateSpeed: 0.0045,
	      },
	      hoverFocus: {
	        enabled: true,
	        thresholdPx: 54,
	        throttleMs: 28,
	        clearOnLeave: false,
	        clearOnMiss: false,
	        positionChannels: ["position", "targetPosition"],
	      },
	    });

	    const runtime = new MetricVisualRuntime(setup.runtimeOptions);
	    setup.style.attachRuntime(runtime);
    let currentScene = null;

    window.metricHeroFrame = {
      runtime,
      style: setup.style,
      profile: setup.profile,
      stage: setup.stage,
      scene: null,
    };

    const rigReporter = attachMiniatureRigReporter({
      target: document.documentElement,
      resolve: () => ({
        runtime,
        style: setup.style,
        stage: setup.stage,
        bundle: currentScene,
      }),
    });

    function writeStatus(lines) {
      status.innerHTML = lines.map((line) => `<div>${escapeHtml(line)}</div>`).join("");
    }

    function fitCanvas() {
      const rect = canvas.getBoundingClientRect();
      runtime.resize(Math.max(1, Math.floor(rect.width)), Math.max(1, Math.floor(rect.height)));
    }

    try {
      const response = await fetch("/docs/examples/assets/process-curve-external/evidence.json");
      if (!response.ok) throw new Error(`evidence ${response.status}`);
      const evidence = await response.json();
      const document = adaptMetricEvidenceV1(evidence);
      const datasetId = "power_demand";

      runtime.setDocument(document, { views: false });
      fitCanvas();

      const sceneInput = createProcessCurveMiniatureLayerDescriptors(document, {
        datasetId,
        stage: setup.stage,
        groundY: setup.stage.grounding?.groundY,
        morphLoop: true,
        pointSize: 1.85,
        projectionSize: 2.85,
        trackMode: "tube",
        trackRadius: 0.012,
        trackRadialSegments: 8,
        trackAlpha: 0.92,
      });
      const scene = createMiniatureHeroSceneBundle(sceneInput.descriptors, {
        stage: setup.stage,
        fit: { targetSpan: 2.74 },
        ground: {
          groundY: setup.stage.grounding?.groundY,
          padding: 0.66,
        },
        contacts: {
          includeSamples: false,
        },
        motion: "miniature",
        metadata: {
          example: "process-curve-miniature-hero-frame",
          datasetId,
        },
	      });
	
	      setup.style.applyBundle(runtime, scene, { source: "miniature-hero-frame" });
	      const focusRecord = sceneInput.inputs.records[Math.floor(sceneInput.inputs.records.length * 0.58)];
	      const focusPosition = focusPointForRecord(sceneInput.inputs, scene.fit, focusRecord?.id);
	      if (focusPosition) {
	        runtime.setFocusTarget({
	          type: "point",
	          source: "miniature-hero-frame-record",
	          recordId: focusRecord.id,
	          coordinateId: sceneInput.inputs.targetCoordinate.id,
	          position: focusPosition,
	        });
	      }
	      currentScene = scene;
	      runtime.start();
	      runtime.renderOnce();
	
	      window.metricHeroFrame = {
	        runtime,
        style: setup.style,
        profile: setup.style.toProfile({ includeDiagnostics: true }),
	        stage: setup.stage,
	        scene,
	        inputs: sceneInput.inputs,
	        focusRecordId: focusRecord?.id || null,
	        focusPosition,
	        rigReporter,
	      };
	      rigReporter.publish();
	      requestAnimationFrame(rigReporter.publish);

      writeStatus([
        `schema: ${document.schema}`,
        `records: ${sceneInput.inputs.records.length}`,
        `layers: ${runtime.getState().layerInstanceCount}`,
        `state: ${runtime.getState().layerState.status}`,
      ]);
    } catch (error) {
      console.error(error);
      writeStatus([`error: ${error.message}`]);
    }

    addEventListener("resize", fitCanvas);
    addEventListener("keydown", (event) => {
      if (event.key === "i" || event.key === "I") {
        document.body.classList.toggle("metric-inspect");
      }
    });

	    function escapeHtml(value) {
	      return String(value)
	        .replaceAll("&", "&amp;")
	        .replaceAll("<", "&lt;")
	        .replaceAll(">", "&gt;")
	        .replaceAll('"', "&quot;");
	    }

	    function focusPointForRecord(inputs, fit, recordId) {
	      const entry = (inputs.targetCoordinate.record_positions || []).find((position) => position.record_id === recordId);
	      const values = entry?.position || [];
	      if (!entry || values.length < 2) return null;
	      const rawX = Number(values[0]) || 0;
	      const rawZ = Number(values[2] ?? values[1]) || 0;
	      const x = fit ? (rawX - fit.center.x) * fit.scale : rawX;
	      const z = fit ? (rawZ - fit.center.z) * fit.scale : rawZ;
	      const y = fit?.sameRoomMorph?.flatY ?? -0.49;
	      return [x, y, z];
	    }
	  </script>
</body>
</html>
